name: Build Image and Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # -----------------------
    # Checkout
    # -----------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------
    # Azure Login
    # -----------------------
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # -----------------------
    # Setup Packer
    # -----------------------
    - name: Setup Packer
      uses: hashicorp/setup-packer@v2

    # -----------------------
    # Packer Init
    # -----------------------
    - name: Packer Init
      run: packer init ./packer

    # -----------------------
    # Build Image
    # -----------------------
    - name: Build Image
      run: |
        packer build \
          -var "client_id=${{ secrets.ARM_CLIENT_ID }}" \
          -var "client_secret=${{ secrets.ARM_CLIENT_SECRET }}" \
          -var "subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
          -var "tenant_id=${{ secrets.ARM_TENANT_ID }}" \
          ./packer/windows-iis.pkr.hcl

    # -----------------------
    # Extract Image ID
    # -----------------------
    - name: Extract Image ID
      run: |
        IMAGE_ID=$(jq -r '.builds[0].artifact_id' packer/packer-manifest.json)
        echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

    # -----------------------
    # Setup Terraform
    # -----------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # -----------------------
    # Terraform Init
    # -----------------------
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    # -----------------------
    # Terraform Apply
    # -----------------------
    - name: Terraform Apply
      working-directory: ./terraform
      run: |
        terraform apply -auto-approve \
          -var="image_id=$IMAGE_ID"

    # -----------------------
    # Get VM Public IP
    # -----------------------
    - name: Get VM IP
      working-directory: ./terraform
      run: |
        VM_IP=$(terraform output -raw vm_public_ip)
        echo "VM_IP=$VM_IP" >> $GITHUB_ENV

    # -----------------------
    # Setup Python
    # -----------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # -----------------------
    # Install Ansible + WinRM
    # -----------------------
    - name: Install Ansible
      run: |
        pip install ansible pywinrm

    # -----------------------
    # Create Dynamic Inventory
    # -----------------------
    - name: Create Inventory
      run: |
        cat <<EOF > ansible/inventory.ini
        [windows]
        vm-devops ansible_host=${VM_IP}

        [windows:vars]
        ansible_user=azureuser
        ansible_password=${{ secrets.VM_ADMIN_PASSWORD }}
        ansible_connection=winrm
        ansible_winrm_transport=basic
        ansible_winrm_server_cert_validation=ignore
        ansible_port=5986
        EOF

    # -----------------------
    # Run Ansible
    # -----------------------
    - name: Run Ansible
      run: |
        ansible-playbook -i ansible/inventory.ini ansible/playbook.yml