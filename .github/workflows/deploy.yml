name: Build Image and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'packer/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # -----------------------
    # Checkout repo
    # -----------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------
    # Login to Azure
    # -----------------------
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # -----------------------
    # Install Packer
    # -----------------------
    - name: Setup Packer
      uses: hashicorp/setup-packer@v2

    # -----------------------
    # Packer Init
    # -----------------------
    - name: Packer Init
      run: packer init ./packer

    # -----------------------
    # Debug ARM Variables
    # -----------------------
    - name: Debug ARM Variables
      run: |
        env | grep ARM_

    # -----------------------
    # Build Image
    # -----------------------
    - name: Build Image
      env:
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      run: |
        env | grep ARM_
        packer build ./packer/windows-iis.pkr.hcl
        
    # -----------------------
    # Ensure jq exists
    # -----------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # -----------------------
    # Extract Image ID
    # -----------------------
    - name: Extract Image ID
      id: extract
      run: |
        IMAGE_ID=$(jq -r '.builds[0].artifact_id' packer/packer-manifest.json)
        echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

    # -----------------------
    # Install Terraform
    # -----------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # -----------------------
    # Terraform Init
    # -----------------------
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    # -----------------------
    # Terraform Apply
    # -----------------------
    - name: Terraform Apply
      working-directory: ./terraform
      run: |
        terraform apply -auto-approve \
          -var="image_id=$IMAGE_ID"